name: CI Pipeline

on: push

jobs: 
  project-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      - name: Check files
        run: |
          echo "Files in repro:"
          ls -R
      - name: Pull train and test data
        run: |
          dvc pull data/raw/jigsaw_toxic_comment_classification_train.csv.dvc
          dvc pull data/raw/jigsaw_toxic_comment_classification_test.csv.dvc

      - name: Run DVC pipeline
        env:
         DAGSHUB_TOKEN: ${{secrets.JTC_CLASSIFICATION}}
        run: dvc repro
      - name: Run model tests
        env:
           DAGSHUB_TOKEN: ${{secrets.JTC_CLASSIFICATION}}
        run: |
          python -m unittest tests/model_test.py

      - name: Promote model to production
        if: success()
        env:
           DAGSHUB_TOKEN: ${{secrets.JTC_CLASSIFICATION}}
        run: python scripts/production.py