apiVersion: apps/v1
kind: Deployment
metadata:
  # name of the deployment
  name: ml-streamlit-deployment
  labels:
    app: toxic-comment-classification

spec:
  replicas: 1

  selector:
    matchLabels:
      app: toxic-comment-classification

  template:
    metadata:
      labels:
        app: toxic-comment-classification

    spec:
      containers:
      - name: toxic-comment-classification
        image: gadhwal41/toxic-comment-classifier:latest

        ports:
        - containerPort: 8501

        resources:
          limits:
            memory: "1Gi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
# name of the service
  name: toxic-comment-classification-service
spec:
    # Selects  all pods with the label 'toxic-comment-classification'
  selector:
    app: toxic-comment-classification
  ports:
    - protocol: TCP
      port: 80 # The port the service exposes (users hit this port)
      targetPort: 8501 # The port the container is listening on
        # Type: NodePort exposes the service outside the cluster,making it easy to access.
  type: LoadBalancer
